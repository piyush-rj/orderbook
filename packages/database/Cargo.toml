[package]
name = "database"
version = "0.1.0"
edition = "2024"

[dependencies]
sea-orm = { version = "1.0", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
    "macros",
    "with-chrono",
    "with-uuid",
] }
sea-orm-migration = { version = "1.0", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
] }
dotenvy = "0.15"
serde.workspace = true
tokio.workspace = true
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
